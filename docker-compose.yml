
#firefox - cfmmo
version: "3"

services:
    haproxy:
        build:
            context: .
            dockerfile: HaproxyDockerfile
        image: haproxyimg
        container_name: haproxy
        ports:
            - 2086:10000
            - 56789:9999
        volumes:
           - ./ovpn:/ovpn
        links:
            - warp:warp
            - proxy001:proxy001
            - psiphon001:psiphon001
            - ovpn_proxy_00:vpn00
            - ovpn_proxy_01:vpn01
            - ovpn_proxy_02:vpn02
            - ovpn_proxy_03:vpn03
            - ovpn_proxy_04:vpn04
            - ovpn_proxy_05:vpn05
            - ovpn_proxy_06:vpn06
            - ovpn_proxy_07:vpn07
            - ovpn_proxy_08:vpn08
            - ovpn_proxy_09:vpn09
            - ovpn_proxy_10:vpn10
            - ovpn_proxy_11:vpn11
            - ovpn_proxy_12:vpn12
            - ovpn_proxy_13:vpn13
            - ovpn_proxy_14:vpn14
            - ovpn_proxy_15:vpn15
            - ovpn_proxy_16:vpn16
            - ovpn_proxy_17:vpn17
            - ovpn_proxy_18:vpn18
            - ovpn_proxy_19:vpn19

        restart: always
        networks:
            custom_network:
                ipv4_address: 172.21.0.100
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "1"
    warp:
        image: caomingjun/warp
        restart: always
        environment:
            - WARP_SLEEP=2
            # - WARP_LICENSE_KEY= # optional
        cap_add:
            - NET_ADMIN
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=0
            - net.ipv4.conf.all.src_valid_mark=1
        volumes:
            - ./data:/var/lib/cloudflare-warp

        networks:
            custom_network:
                ipv4_address: 172.21.0.101
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "1"
  
    psiphon001:
        build:
            context: .
            dockerfile: PsiphonDockerfile
        image: psiphonimg
        container_name: psiphon001
        hostname: psiphon001
        restart: always
        environment:
            # Leave empty for fastest/any region. Set e.g. SG, JP, US to pin egress geo.
            - EGRESS_REGION=
            # Optional: auto-fetch a fresh psiphon config from this URL on start
            # and on each refresh. Empty = always use the bundled standard config.
            # Invalid/unreachable downloads automatically fall back to standard.
            - CONFIG_URL=https://raw.githubusercontent.com/swarupsengupta2007/psiphon-docker/master/assets/psiphon.config
            # Seconds between config re-checks when CONFIG_URL is set (0 = off).
            # On change, Psiphon restarts (restart: always) to apply it.
            - CONFIG_REFRESH_INTERVAL=21600
            # URL the healthcheck fetches THROUGH the Psiphon proxy to prove egress.
            - HEALTHCHECK_URL=https://ifconfig.io/ip
        volumes:
            - ./psiphon_data:/psiphon/data
        networks:
            custom_network:
                ipv4_address: 172.21.0.132
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "1"

    proxy001:
        image: bluet/proxybroker2:v2.0.0-alpha6
        container_name: proxy001
        hostname: proxy001
        restart: always
        cap_add:
            - NET_ADMIN
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=0
            - net.ipv4.conf.all.src_valid_mark=1
        command: serve --host 0.0.0.0 --port 8888 --types HTTP HTTPS --lvl High --strict -l 10 --min-queue 100
        stdin_open: true
        tty: true
        networks:
            custom_network:
                ipv4_address: 172.21.0.131
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "1"
    restarter:
        image: docker:cli
        volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
        command: ["/bin/sh", "-c", "while true; do sleep 180; docker restart proxy001; done"]
        restart: always
    ovpn_proxy_00:
        build:
            context: .
            dockerfile: Dockerfile
        image: testimg
        cap_add:
            - NET_ADMIN
        devices:
            - /dev/net/tun
        dns:
            - 1.1.1.1
        volumes:
            - ./ovpn:/ovpn
        restart: always
        networks:
            custom_network:
                ipv4_address: 172.21.0.102
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "1"

