<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoGate Proxy List</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, Segoe UI, Arial, sans-serif; }
    body { margin: 0; background: #f6f8fb; color: #172033; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 18px 40px; }
    header { display: flex; justify-content: space-between; gap: 14px; align-items: end; margin-bottom: 18px; }
    h1 { font-size: 26px; margin: 0 0 5px; letter-spacing: 0; }
    .muted { color: #637083; font-size: 14px; }
    .actions, .list { display: grid; gap: 9px; }
    .actions { grid-auto-flow: column; }
    button { border: 1px solid #cfd7e3; background: #fff; color: #172033; border-radius: 7px; padding: 9px 12px; cursor: pointer; }
    button:hover { border-color: #7e91ad; }
    .row {
      display: grid;
      grid-template-columns: 100px 88px 1fr auto;
      gap: 10px;
      align-items: start;
      background: #fff;
      border: 1px solid #e1e6ee;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .row.rotating { grid-template-columns: 100px 88px 1fr auto; background: #f0f5ff; }
    .badge { width: fit-content; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 700; }
    .up { color: #075b33; background: #dff7e9; }
    .down { color: #8f1f1f; background: #ffe1e1; }
    .unknown { color: #735300; background: #fff1c4; }
    .port { font-weight: 700; font-family: Consolas, Monaco, monospace; font-size: 14px; padding-top: 4px; }
    .detail { min-width: 0; }
    .url { font-family: Consolas, Monaco, monospace; overflow-wrap: anywhere; font-size: 13px; }
    .meta-line { font-size: 12px; color: #4b5a70; margin-top: 4px; line-height: 1.45; overflow-wrap: anywhere; }
    .meta-line code { font-family: Consolas, Monaco, monospace; background: #eef2f7; padding: 1px 5px; border-radius: 4px; color: #1a2a44; }
    .label-sm { color: #7a8799; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
    .toast {
      position: fixed; right: 16px; bottom: 16px; background: #172033; color: #fff;
      padding: 10px 12px; border-radius: 7px; opacity: 0; transform: translateY(8px); transition: .16s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    table.map { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 18px; background: #fff; border: 1px solid #e1e6ee; border-radius: 8px; overflow: hidden; }
    table.map th, table.map td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eef1f5; vertical-align: top; }
    table.map th { background: #f0f3f8; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #5a6a80; }
    table.map td.mono { font-family: Consolas, Monaco, monospace; font-size: 12px; }
    h2 { font-size: 16px; margin: 22px 0 8px; }
    @media (max-width: 720px) {
      header, .actions { display: block; }
      .actions { margin-top: 12px; }
      .row { grid-template-columns: 1fr; }
      button { width: 100%; margin-top: 8px; }
      table.map { display: block; overflow-x: auto; }
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #edf2f7; }
      .muted, .meta-line, .label-sm { color: #aab6c8; }
      .row, button, table.map { background: #182234; border-color: #2e3b50; color: #edf2f7; }
      .row.rotating { background: #1a2740; }
      .meta-line code, table.map th { background: #243247; color: #c5d0e0; }
      table.map th, table.map td { border-bottom-color: #2e3b50; }
      .toast { background: #edf2f7; color: #111827; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>AutoGate Proxy List</h1>
        <div id="meta" class="muted">Loading...</div>
      </div>
      <div class="actions">
        <button id="copy-up">Copy all UP</button>
        <button id="copy-all">Copy all</button>
        <button id="copy-map">Copy map TSV</button>
        <button id="refresh">Refresh</button>
      </div>
    </header>
    <section id="list" class="list"></section>
    <h2>OVPN map (port → local file → remote VPN)</h2>
    <div class="muted" style="margin-bottom:8px">File trong pool <code>./ovpn</code> (prefix <code>local_*</code> = từ <code>ovpn-list/</code>). Remote = host:port trong file .ovpn.</div>
    <table class="map" id="map-table">
      <thead>
        <tr>
          <th>Port</th>
          <th>Worker</th>
          <th>HAProxy</th>
          <th>File pool (./ovpn)</th>
          <th>Local list (ovpn-list)</th>
          <th>Remote VPN</th>
          <th>Proto</th>
        </tr>
      </thead>
      <tbody id="map-body"></tbody>
    </table>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    let currentRows = [];
    let lastData = null;
    const list = document.getElementById("list");
    const meta = document.getElementById("meta");
    const toast = document.getElementById("toast");
    const mapBody = document.getElementById("map-body");

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1300);
    }
    async function copyText(text) {
      await navigator.clipboard.writeText(text);
      showToast("Copied");
    }
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }
    function rowElement(item, isRotating) {
      const row = document.createElement("article");
      row.className = "row" + (isRotating ? " rotating" : "");
      const badge = document.createElement("span");
      badge.className = `badge ${item.kind}`;
      badge.textContent = item.status;
      const port = document.createElement("div");
      port.className = "port";
      port.textContent = String(item.port);
      const detail = document.createElement("div");
      detail.className = "detail";
      const url = document.createElement("div");
      url.className = "url";
      url.textContent = item.url;
      const metaLine = document.createElement("div");
      metaLine.className = "meta-line";
      if (isRotating) {
        metaLine.innerHTML = `<span class="label-sm">OVPN</span> round-robin · không ghim 1 file`;
      } else if (item.file) {
        metaLine.innerHTML =
          `<span class="label-sm">File</span> <code>${esc(item.file)}</code><br>` +
          (item.local_list_file && item.local_list_file !== item.file
            ? `<span class="label-sm">List</span> <code>${esc(item.local_list_file)}</code><br>` : "") +
          `<span class="label-sm">VPN</span> <code>${esc(item.remote || "—")}</code>` +
          (item.proto ? ` · ${esc(item.proto)}` : "");
      } else {
        metaLine.innerHTML = `<span class="label-sm">OVPN</span> chưa ghi status (đợi worker connect / rebuild slave)`;
      }
      detail.append(url, metaLine);
      const button = document.createElement("button");
      button.dataset.copy = item.url;
      button.textContent = "Copy";
      row.append(badge, port, detail, button);
      return row;
    }
    function renderMap(workers) {
      mapBody.replaceChildren();
      for (const w of workers) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono">${esc(w.port)}</td>
          <td class="mono">${esc(w.name)}</td>
          <td><span class="badge ${esc(w.kind)}">${esc(w.status)}</span></td>
          <td class="mono">${esc(w.file || "—")}</td>
          <td class="mono">${esc(w.local_list_file || "—")}</td>
          <td class="mono">${esc(w.remote || "—")}</td>
          <td class="mono">${esc(w.proto || "—")}</td>`;
        mapBody.appendChild(tr);
      }
    }
    function mapTsv(workers) {
      const lines = ["port\tworker\tstatus\tfile\tlocal_list\tremote\tproto\turl"];
      for (const w of workers) {
        lines.push([
          w.port, w.name, w.status,
          w.file || "", w.local_list_file || "",
          w.remote || "", w.proto || "", w.url
        ].join("\t"));
      }
      return lines.join("\n");
    }
    async function load() {
      const response = await fetch("/api/proxies", { cache: "no-store" });
      const data = await response.json();
      lastData = data;
      currentRows = [data.rotating, ...data.workers];
      const country = data.country ? `Country: ${data.country}` : "Mixed country pool";
      const mapped = data.ovpn_mapped != null ? ` · OVPN mapped: ${data.ovpn_mapped}/${data.workers.length}` : "";
      meta.textContent = `${country}${mapped} · ${new Date(data.generated_at * 1000).toLocaleTimeString()}`;
      list.replaceChildren(
        rowElement(data.rotating, true),
        ...data.workers.map(w => rowElement(w, false))
      );
      renderMap(data.workers);
    }
    document.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-copy]");
      if (button) copyText(button.dataset.copy);
    });
    document.getElementById("copy-up").onclick = () =>
      copyText(currentRows.filter(row => row.kind === "up").map(row => row.url).join("\n"));
    document.getElementById("copy-all").onclick = () =>
      copyText(currentRows.map(row => row.url).join("\n"));
    document.getElementById("copy-map").onclick = () => {
      if (!lastData) return;
      copyText(mapTsv(lastData.workers));
    };
    document.getElementById("refresh").onclick = load;
    load();
    setInterval(load, 8000);
  </script>
</body>
</html>
