<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoGate Proxy List</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, Segoe UI, Arial, sans-serif; }
    body { margin: 0; background: #f6f8fb; color: #172033; } main { max-width: 920px; margin: 0 auto; padding: 28px 18px 40px; }
    header { display: flex; justify-content: space-between; gap: 14px; align-items: end; margin-bottom: 18px; } h1 { font-size: 26px; margin: 0 0 5px; letter-spacing: 0; }
    .muted { color: #637083; font-size: 14px; } .actions, .list { display: grid; gap: 9px; } .actions { grid-auto-flow: column; }
    button { border: 1px solid #cfd7e3; background: #fff; color: #172033; border-radius: 7px; padding: 9px 12px; cursor: pointer; } button:hover { border-color: #7e91ad; }
    .row { display: grid; grid-template-columns: 112px 1fr auto; gap: 10px; align-items: center; background: #fff; border: 1px solid #e1e6ee; border-radius: 8px; padding: 10px; }
    .url { font-family: Consolas, Monaco, monospace; overflow-wrap: anywhere; } .badge { width: fit-content; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 700; }
    .up { color: #075b33; background: #dff7e9; } .down { color: #8f1f1f; background: #ffe1e1; } .unknown { color: #735300; background: #fff1c4; }
    .toast { position: fixed; right: 16px; bottom: 16px; background: #172033; color: #fff; padding: 10px 12px; border-radius: 7px; opacity: 0; transform: translateY(8px); transition: .16s ease; } .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 640px) { header, .actions { display: block; } .actions { margin-top: 12px; } .row { grid-template-columns: 1fr; } button { width: 100%; margin-top: 8px; } }
    @media (prefers-color-scheme: dark) { body { background: #111827; color: #edf2f7; } .muted { color: #aab6c8; } .row, button { background: #182234; border-color: #2e3b50; color: #edf2f7; } .toast { background: #edf2f7; color: #111827; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>AutoGate Proxy List</h1>
        <div id="meta" class="muted">Loading...</div>
      </div>
      <div class="actions">
        <button id="copy-up">Copy all UP</button>
        <button id="copy-all">Copy all</button>
        <button id="refresh">Refresh</button>
      </div>
    </header>
    <section id="list" class="list"></section>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    let currentRows = [];
    const list = document.getElementById("list");
    const meta = document.getElementById("meta");
    const toast = document.getElementById("toast");
    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1300);
    }
    async function copyText(text) {
      await navigator.clipboard.writeText(text);
      showToast("Copied");
    }
    function rowElement(item) {
      const row = document.createElement("article");
      const badge = document.createElement("span");
      const url = document.createElement("span");
      const button = document.createElement("button");
      row.className = "row";
      badge.className = `badge ${item.kind}`;
      badge.textContent = item.status;
      url.className = "url";
      url.textContent = item.url;
      button.dataset.copy = item.url;
      button.textContent = "Copy";
      row.append(badge, url, button);
      return row;
    }
    async function load() {
      const response = await fetch("/api/proxies", { cache: "no-store" });
      const data = await response.json();
      currentRows = [data.rotating, ...data.workers];
      const country = data.country ? `Country: ${data.country}` : "Mixed country pool";
      meta.textContent = `${country} · ${new Date(data.generated_at * 1000).toLocaleTimeString()}`;
      list.replaceChildren(...currentRows.map(rowElement));
    }
    document.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-copy]");
      if (button) copyText(button.dataset.copy);
    });
    document.getElementById("copy-up").onclick = () => copyText(currentRows.filter(row => row.kind === "up").map(row => row.url).join("\n"));
    document.getElementById("copy-all").onclick = () => copyText(currentRows.map(row => row.url).join("\n"));
    document.getElementById("refresh").onclick = load;
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
